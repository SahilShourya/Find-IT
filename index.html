<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2C3E50">
<title>SMVDU FindIt</title>
<style>
:root{
  --navy:#1C3557;--blue:#2C3E50;--steel:#5A7FA3;
  --orange:#F47C20;--green:#28A745;--leaf:#3FAE49;
  --white:#fff;--off:#F4F6F8;--text:#4A4A4A;
  --head:#1F3A5F;--border:#D9D9D9;--muted:#888;--red:#DC3545;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--off);color:var(--text);font-size:15px;}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100%;height:100dvh;}

/* ── TOP BAR ── */
.topbar{background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:56px;padding-top:var(--safe-top);flex-shrink:0;border-bottom:3px solid var(--orange);position:relative;z-index:100;}
.topbar-logo{display:flex;align-items:center;gap:8px;}
.topbar-logo svg{width:34px;height:34px;flex-shrink:0;}
.topbar-logo .tb{display:flex;flex-direction:column;line-height:1.2;}
.topbar-logo .tb .t{font-size:.55rem;font-weight:700;color:var(--orange);letter-spacing:1.5px;text-transform:uppercase;}
.topbar-logo .tb .b{font-size:.88rem;font-weight:700;color:#fff;}
.topbar-logo .tb .b span{color:var(--orange);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.topbar-auth{background:var(--green);color:#fff;border:none;padding:7px 14px;border-radius:20px;font-size:.82rem;font-weight:600;cursor:pointer;}

/* ── PAGES ── */
.pages{flex:1;overflow:hidden;position:relative;}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;background:var(--off);}
.page.active{display:block;}

/* ── BOTTOM NAV ── */
.bottom-nav{display:flex;background:var(--white);border-top:1px solid var(--border);padding-bottom:var(--safe-bottom);flex-shrink:0;}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-size:.65rem;gap:3px;position:relative;transition:color .15s;}
.bn-item .ico{font-size:1.35rem;line-height:1;}
.bn-item.active{color:var(--orange);}
.bn-item.active .ico{transform:scale(1.1);}
.bn-badge{position:absolute;top:6px;right:calc(50% - 14px);background:var(--red);color:#fff;border-radius:10px;font-size:.6rem;padding:1px 5px;min-width:16px;text-align:center;display:none;}
.bn-badge.show{display:block;}

/* ── HOME PAGE ── */
.hero{background:var(--navy);padding:28px 16px 24px;text-align:center;}
.hero-badge{display:inline-block;background:var(--orange);border-radius:20px;padding:4px 14px;font-size:.72rem;color:#fff;font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:.4px;}
.hero h1{font-size:1.55rem;font-weight:700;color:#fff;line-height:1.25;margin-bottom:10px;}
.hero h1 span{color:var(--orange);}
.hero p{font-size:.85rem;color:rgba(255,255,255,.7);margin-bottom:20px;line-height:1.6;}
.hero-btns{display:flex;flex-direction:column;gap:10px;max-width:280px;margin:0 auto;}
.btn-hero-p{background:var(--green);color:#fff;border:none;padding:13px;border-radius:10px;font-size:.92rem;font-weight:600;cursor:pointer;width:100%;}
.btn-hero-s{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.3);padding:13px;border-radius:10px;font-size:.92rem;cursor:pointer;width:100%;}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--blue);border-bottom:1px solid rgba(255,255,255,.07);}
.stat-box{padding:14px 8px;text-align:center;border-right:1px solid rgba(255,255,255,.07);}
.stat-box:last-child{border-right:none;}
.stat-box .n{font-size:1.4rem;font-weight:700;color:var(--orange);}
.stat-box .l{font-size:.65rem;color:rgba(255,255,255,.55);margin-top:1px;}

.home-body{padding:14px;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sec-title{font-size:1rem;font-weight:700;color:var(--head);}
.sec-title span{color:var(--orange);}

/* ── ITEM CARDS ── */
.cards-list{display:flex;flex-direction:column;gap:10px;}
.item-card{background:var(--white);border-radius:12px;overflow:hidden;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.item-card-inner{display:flex;gap:0;}
.item-thumb{width:88px;height:88px;background:var(--off);display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;}
.item-thumb img{width:100%;height:100%;object-fit:cover;}
.item-info{flex:1;padding:10px 12px;min-width:0;}
.item-tags{display:flex;gap:5px;margin-bottom:5px;flex-wrap:wrap;}
.tag{font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;}
.tag-lost{background:#fde8e8;color:var(--red);}
.tag-found{background:#e6f5ec;color:var(--green);}
.tag-cat{background:var(--off);color:var(--muted);}
.item-name{font-size:.92rem;font-weight:700;color:var(--head);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-loc{font-size:.76rem;color:var(--muted);}
.item-date{font-size:.72rem;color:var(--muted);margin-top:2px;}

/* ── BROWSE PAGE ── */
.browse-head{background:var(--white);padding:12px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.search-inp{width:100%;background:var(--off);border:none;padding:10px 14px 10px 36px;border-radius:20px;font-size:.9rem;color:var(--text);outline:none;}
.search-wrap{position:relative;}
.search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.85rem;}

/* ── CHAT LIST ── */
.chat-list-page{height:100%;display:flex;flex-direction:column;}
.chat-list-hdr{background:var(--white);padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:1rem;color:var(--head);}
.chat-list-scroll{flex:1;overflow-y:auto;}
.chat-list-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;background:var(--white);}
.cl-av{width:46px;height:46px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;flex-shrink:0;overflow:hidden;}
.cl-av img{width:100%;height:100%;object-fit:cover;}
.cl-info{flex:1;min-width:0;}
.cl-name{font-size:.92rem;font-weight:600;color:var(--head);}
.cl-msg{font-size:.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}

/* CHAT WINDOW */
.chat-window{position:fixed;inset:0;background:var(--off);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;}
.chat-window.open{transform:translateX(0);}
.cw-top{background:var(--blue);color:#fff;display:flex;align-items:center;gap:12px;padding:10px 14px;padding-top:calc(10px + var(--safe-top));flex-shrink:0;}
.cw-back{background:transparent;border:none;color:#fff;font-size:1.3rem;cursor:pointer;padding:4px;}
.cw-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px;}
.bubble{max-width:78%;padding:8px 11px 5px;border-radius:12px;font-size:.88rem;line-height:1.45;word-break:break-word;position:relative;}
.bubble-in{background:var(--white);align-self:flex-start;border-radius:0 12px 12px 12px;box-shadow:0 1px 2px rgba(0,0,0,.1);}
.bubble-out{background:#dcf8c6;align-self:flex-end;border-radius:12px 0 12px 12px;box-shadow:0 1px 2px rgba(0,0,0,.1);}
.cw-inp-wrap{background:var(--off);padding:8px 10px;padding-bottom:calc(8px + var(--safe-bottom));display:flex;align-items:flex-end;gap:8px;border-top:1px solid var(--border);}
.cw-inp{flex:1;background:var(--white);border:none;border-radius:20px;padding:10px 16px;font-size:.9rem;outline:none;resize:none;}
.cw-send{width:44px;height:44px;border-radius:50%;background:var(--orange);border:none;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* ── USERS PAGE ── */
.users-hdr{background:var(--white);padding:12px 14px;border-bottom:1px solid var(--border);}
.users-list{padding:12px;display:flex;flex-direction:column;gap:8px;}
.user-card{background:var(--white);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.user-av{width:46px;height:46px;border-radius:50%;background:var(--off);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;overflow:hidden;}
.user-av img{width:100%;height:100%;object-fit:cover;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:.92rem;font-weight:700;color:var(--head);}
.user-detail{font-size:.76rem;color:var(--muted);margin-top:2px;}
.user-chat-btn{background:var(--steel);color:#fff;border:none;padding:7px 14px;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;}

/* ── MODALS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:var(--safe-bottom);animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-hdr{padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.sheet-title{font-size:1rem;font-weight:700;color:var(--head);}
.sheet-body{padding:16px 18px;}

/* FORM */
.fg{margin-bottom:12px;}
.fl{display:block;font-size:.76rem;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;}
.fi,.fs,.ft{width:100%;background:var(--off);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:.92rem;outline:none;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-full{width:100%;background:var(--navy);color:#fff;border:none;padding:14px;border-radius:12px;font-size:.95rem;font-weight:600;cursor:pointer;}
.btn-full.green{background:var(--green);}

/* TOAST */
.toast-wrap{position:fixed;top:calc(56px + 8px + var(--safe-top));left:12px;right:12px;z-index:500;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.toast{background:rgba(28,53,87,.95);color:#fff;padding:12px 16px;border-radius:12px;font-size:.85rem;border-left:3px solid var(--steel);box-shadow:0 4px 16px rgba(0,0,0,.2);animation:toastIn .25s ease;}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* LOADING */
.spin{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:sp .7s linear infinite;display:inline-block;}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <div class="topbar-logo">
      <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <circle cx="22" cy="22" r="22" fill="#ffffff"/>
        <circle cx="22" cy="22" r="20" fill="#1C3557"/>
        <ellipse cx="22" cy="10" rx="4" ry="6" fill="#F47C20"/>
        <text x="22" y="40" text-anchor="middle" font-size="4.5" font-weight="bold" fill="#F47C20" font-family="Arial">SMVDU</text>
      </svg>
      <div class="tb">
        <span class="t">SMVDU</span>
        <span class="b">Find<span>It</span></span>
      </div>
    </div>
    <div class="topbar-right">
      <button class="topbar-auth" id="authBtn" onclick="openAuthModal()">Sign In</button>
    </div>
  </div>

  <div class="pages">

    <div class="page active" id="page-home">
      <div class="hero">
        <div class="hero-badge">SMVDU, Katra</div>
        <h1>Lost something?<br><span>We'll find it.</span></h1>
        <p>Report lost items, find what others found, chat instantly.</p>
        <div class="hero-btns">
          <button class="btn-hero-p" onclick="openReportModal('lost')">📢 Report Lost</button>
          <button class="btn-hero-s" onclick="openReportModal('found')">🔍 Found Something</button>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-box"><div class="n" id="statLost">--</div><div class="l">Lost</div></div>
        <div class="stat-box"><div class="n" id="statFound">--</div><div class="l">Found</div></div>
        <div class="stat-box"><div class="n" id="statResolved">--</div><div class="l">Reunited</div></div>
      </div>
      <div class="home-body">
        <div class="sec-head">
          <div class="sec-title">Recent <span>Activity</span></div>
        </div>
        <div id="recentList" class="cards-list"></div>
      </div>
    </div>

    <div class="page" id="page-items">
      <div class="browse-head">
        <div class="search-wrap">
          <input class="search-inp" type="text" id="searchInput" placeholder="Search items..." oninput="filterItems()">
        </div>
      </div>
      <div id="itemsList" class="cards-list" style="padding:14px;"></div>
    </div>

    <div class="page" id="page-chat">
      <div class="chat-list-page">
        <div class="chat-list-hdr">Messages</div>
        <div class="chat-list-scroll" id="chatList"></div>
      </div>
    </div>

    <div class="page" id="page-users">
      <div class="users-hdr">
        <div class="search-wrap">
          <input class="search-inp" type="text" id="userSearch" placeholder="Search students by name..." oninput="searchUsers(this.value)">
        </div>
      </div>
      <div class="users-list" id="usersList"></div>
    </div>

    <div class="page" id="page-profile">
      <div id="profContent" style="padding:20px; text-align:center;">
        <p>Sign in to view your profile.</p>
      </div>
    </div>

  </div>

  <div class="bottom-nav">
    <button class="bn-item active" id="bn-home" onclick="showPage('home')">
      <span class="ico">🏠</span><span>Home</span>
    </button>
    <button class="bn-item" id="bn-items" onclick="showPage('items')">
      <span class="ico">🔍</span><span>Browse</span>
    </button>
    <button class="bn-item" id="bn-chat" onclick="showPage('chat')">
      <span class="ico">💬</span><span>Chat</span>
      <span class="bn-badge" id="bn-badge"></span>
    </button>
    <button class="bn-item" id="bn-users" onclick="showPage('users')">
      <span class="ico">👥</span><span>Students</span>
    </button>
    <button class="bn-item" id="bn-profile" onclick="showPage('profile')">
      <span class="ico">👤</span><span>Profile</span>
    </button>
  </div>

</div>

<div class="chat-window" id="chatWindow">
  <div class="cw-top">
    <button class="cw-back" onclick="closeChatWindow()">&#8592;</button>
    <div id="cwName">Chat</div>
  </div>
  <div class="cw-msgs" id="cwMsgs"></div>
  <div class="cw-inp-wrap">
    <textarea class="cw-inp" id="cwInp" placeholder="Type a message..." rows="1"></textarea>
    <button class="cw-send" onclick="sendMsg()">&#10148;</button>
  </div>
</div>

<div class="overlay" id="reportModal">
  <div class="sheet">
    <div class="sheet-hdr">
      <div class="sheet-title" id="repTitle">Report Item</div>
      <button onclick="closeModal('reportModal')">&#x2715;</button>
    </div>
    <div class="sheet-body">
      <input type="hidden" id="repType">
      <div class="fg">
        <label class="fl">Item Name *</label>
        <input class="fi" type="text" id="itemName" placeholder="e.g. Black Wallet">
      </div>
      <div class="fg">
        <label class="fl">Category *</label>
        <select class="fs" id="itemCat">
          <option value="Electronics">📱 Electronics</option>
          <option value="ID/Documents">🪪 ID/Docs</option>
          <option value="Bag/Backpack">🎒 Bag</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>
      <div class="fg">
        <label class="fl">Location *</label>
        <input class="fi" type="text" id="itemLoc" placeholder="e.g. Central Library">
      </div>
      <div class="fg">
        <label class="fl">Description</label>
        <textarea class="ft" id="itemDesc" style="width:100%; height:80px;"></textarea>
      </div>
      <div class="fg">
        <label class="fl">Photo (optional)</label>
        <input type="file" id="itemPhoto" accept="image/*">
      </div>
      <div class="fg" style="display:none;">
          <input type="date" id="itemDate">
      </div>
      <button class="btn-full green" id="submitBtn" onclick="submitReport()">Submit Report</button>
    </div>
  </div>
</div>

<div class="overlay" id="authModal">
  <div class="sheet">
    <div class="sheet-body" style="text-align:center;">
      <h3>Welcome back</h3>
      <p style="margin:10px 0 20px;">Sign in with Google to continue</p>
      <button class="btn-full" onclick="signIn()">Continue with Google</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc, query, orderBy, onSnapshot, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBrwqF0UimXJonkwp8uV71MaGI2IzoyQfM",
  authDomain: "find-it-b3fa2.firebaseapp.com",
  projectId: "find-it-b3fa2",
  storageBucket: "find-it-b3fa2.firebasestorage.app",
  messagingSenderId: "521549279482",
  appId: "1:521549279482:web:0bfb3509101dc380305943"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null, allItems = [];
let activeChatId = null, unsubChat = null;

// ── AUTH LOGIC ──
onAuthStateChanged(auth, async user => {
  currentUser = user;
  if(user) {
    document.getElementById('authBtn').textContent = 'Sign Out';
    document.getElementById('authBtn').onclick = () => signOut(auth);
    closeModal('authModal');
    syncUserRecord(user);
    loadItems();
    loadChatList();
    listenForUnread();
  } else {
    document.getElementById('authBtn').textContent = 'Sign In';
    document.getElementById('authBtn').onclick = () => openModal('authModal');
  }
});

async function signIn() {
  const provider = new GoogleAuthProvider();
  try { await signInWithPopup(auth, provider); } catch(e) { console.error(e); }
}

async function syncUserRecord(user) {
  const userRef = doc(db, 'users', user.uid);
  await setDoc(userRef, {
    uid: user.uid,
    name: user.displayName,
    email: user.email,
    lastActive: serverTimestamp()
  }, { merge: true });
}

// ── PAGE NAVIGATION ──
window.showPage = (page) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.bn-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('bn-' + page).classList.add('active');
};

window.openModal = (id) => document.getElementById(id).classList.add('open');
window.closeModal = (id) => document.getElementById(id).classList.remove('open');

// ── STUDENT SEARCH ──
window.searchUsers = async (val) => {
  const qStr = val.trim().toLowerCase();
  const list = document.getElementById('usersList');
  if (qStr.length < 2) {
    list.innerHTML = '<p style="text-align:center; padding:20px;">Type at least 2 characters...</p>';
    return;
  }
  const snap = await getDocs(collection(db, 'users'));
  const users = snap.docs.map(d => d.data()).filter(u => 
    u.name.toLowerCase().includes(qStr)
  );
  list.innerHTML = users.map(u => `
    <div class="user-card">
      <div class="user-av">${u.name.charAt(0)}</div>
      <div class="user-info">
        <div class="user-name">${u.name}</div>
        <div class="user-detail">${u.email}</div>
      </div>
      <button class="user-chat-btn" onclick="startDirectChat('${u.uid}', '${u.name}')">Message</button>
    </div>
  `).join('');
};

// ── MESSAGING SYSTEM ──
window.startDirectChat = (uid, name) => {
  if (!currentUser) { openModal('authModal'); return; }
  if (uid === currentUser.uid) return;
  const chatId = [currentUser.uid, uid].sort().join('_');
  window._chatMap = window._chatMap || {};
  window._chatMap[chatId] = { name, uid };
  showPage('chat');
  setTimeout(() => openChatWindow(chatId, name, uid), 50);
};

window.openChatWindow = async (chatId, name, uid) => {
  activeChatId = chatId;
  document.getElementById('cwName').textContent = name;
  document.getElementById('chatWindow').classList.add('open');
  if (unsubChat) unsubChat();
  
  unsubChat = onSnapshot(query(collection(db, 'chats', chatId, 'messages'), orderBy('time')), snap => {
    const box = document.getElementById('cwMsgs');
    box.innerHTML = snap.docs.map(d => {
      const m = d.data();
      const mine = m.senderId === currentUser.uid;
      return `<div class="bubble ${mine ? 'bubble-out' : 'bubble-in'}">${m.text}</div>`;
    }).join('');
    box.scrollTop = box.scrollHeight;
  });
};

window.closeChatWindow = () => {
    document.getElementById('chatWindow').classList.remove('open');
    if(unsubChat) unsubChat();
    activeChatId = null;
};

window.sendMsg = async () => {
  const inp = document.getElementById('cwInp');
  const text = inp.value.trim();
  if (!text || !activeChatId) return;
  inp.value = '';
  await addDoc(collection(db, 'chats', activeChatId, 'messages'), {
    text, senderId: currentUser.uid, time: serverTimestamp()
  });
  await setDoc(doc(db, 'chats', activeChatId), {
    lastMessage: text,
    lastUpdated: serverTimestamp(),
    lastSenderId: currentUser.uid,
    participants: activeChatId.split('_')
  }, { merge: true });
};

async function loadChatList() {
  const q = query(collection(db, 'chats'), where('participants', 'array-contains', currentUser.uid), orderBy('lastUpdated', 'desc'));
  onSnapshot(q, snap => {
    const list = document.getElementById('chatList');
    list.innerHTML = snap.docs.map(d => {
      const data = d.data();
      const otherId = data.participants.find(id => id !== currentUser.uid);
      return `<div class="chat-list-item" onclick="startDirectChat('${otherId}', 'User')">
        <div class="cl-av">U</div>
        <div class="cl-info">
          <div class="cl-name">User ${otherId.substring(0,5)}</div>
          <div class="cl-msg">${data.lastMessage}</div>
        </div>
      </div>`;
    }).join('');
  });
}

function listenForUnread() {
  const q = query(collection(db, 'chats'), where('participants', 'array-contains', currentUser.uid));
  onSnapshot(q, snap => {
    let hasUnread = false;
    snap.docs.forEach(d => {
      const data = d.data();
      if (data.lastSenderId && data.lastSenderId !== currentUser.uid && activeChatId !== d.id) hasUnread = true;
    });
    document.getElementById('bn-badge').style.display = hasUnread ? 'block' : 'none';
  });
}

// ── HIGH SPEED REPORTING ──
window.openReportModal = (type) => {
  if (!currentUser) { openModal('authModal'); return; }
  document.getElementById('repType').value = type;
  document.getElementById('repTitle').textContent = type === 'lost' ? 'Report Lost' : 'Report Found';
  document.getElementById('itemDate').value = new Date().toISOString().split('T')[0];
  openModal('reportModal');
};

window.submitReport = async () => {
  const name = document.getElementById('itemName').value.trim();
  const btn = document.getElementById('submitBtn');
  if(!name) return;
  
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    let imageUrl = '';
    const file = document.getElementById('itemPhoto').files[0];
    if (file) {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('upload_preset', 'smvdu-findit');
      const res = await fetch('https://api.cloudinary.com/v1_1/duxehxynt/image/upload', {method:'POST', body:fd});
      const data = await res.json();
      imageUrl = data.secure_url;
    }

    await addDoc(collection(db, 'items'), {
      name,
      type: document.getElementById('repType').value,
      category: document.getElementById('itemCat').value,
      location: document.getElementById('itemLoc').value,
      description: document.getElementById('itemDesc').value,
      imageUrl,
      userId: currentUser.uid,
      status: 'active',
      createdAt: serverTimestamp()
    });

    showToast("Reported successfully!");
    closeModal('reportModal');
  } catch(e) { console.error(e); }
  btn.disabled = false;
  btn.textContent = 'Submit Report';
};

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.getElementById('toastWrap').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function loadItems() {
  onSnapshot(query(collection(db, 'items'), orderBy('createdAt', 'desc')), snap => {
    allItems = snap.docs.map(d => ({id: d.id, ...d.data()}));
    renderItems(allItems, 'recentList');
    renderItems(allItems, 'itemsList');
  });
}

function renderItems(items, containerId) {
  const cont = document.getElementById(containerId);
  if(!cont) return;
  cont.innerHTML = items.map(i => `
    <div class="item-card">
      <div class="item-card-inner">
        <div class="item-thumb">${i.imageUrl ? `<img src="${i.imageUrl}">` : '📦'}</div>
        <div class="item-info">
          <span class="tag ${i.type==='lost'?'tag-lost':'tag-found'}">${i.type}</span>
          <div class="item-name">${i.name}</div>
          <div class="item-loc">📍 ${i.location}</div>
        </div>
      </div>
    </div>
  `).join('');
}
</script>
</body>
